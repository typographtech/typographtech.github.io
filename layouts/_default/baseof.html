<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .Title }}</title>

    <!-- SEO Meta Tags -->
    <meta name="description" content="{{ .Site.Params.description }}">
    <meta name="keywords" content="{{ .Site.Params.keywords }}">
    <meta name="author" content="{{ .Site.Params.author }}">

    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="{{ .Permalink }}">
    <meta property="og:title" content="{{ .Title }}">
    <meta property="og:description" content="{{ .Site.Params.description }}">
    <meta property="og:locale" content="en_US">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="{{ .Title }}">
    <meta name="twitter:description" content="{{ .Site.Params.description }}">

    <!-- Canonical URL -->
    <link rel="canonical" href="{{ .Permalink }}">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/images/tt_wordmark_favicon.png">
    <link rel="apple-touch-icon" href="/images/tt_wordmark_favicon.png">

    <!-- Schema.org Local Business -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "ProfessionalService",
        "name": "Typograph Tech Limited",
        "description": "{{ .Site.Params.description }}",
        "url": "{{ .Site.BaseURL }}",
        "address": {
            "@type": "PostalAddress",
            "addressLocality": "Hong Kong",
            "addressCountry": "HK"
        },
        "serviceType": ["IT Consulting", "Software Development", "Data Analytics"]
    }
    </script>

    <!-- Styles -->
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    {{ block "main" . }}{{ end }}
</body>
</html>
